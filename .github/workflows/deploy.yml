name: サイトをビルドしてGitHub Pagesへ公開

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call: # 記事生成ワークフローから呼び出される

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # 生成ワークフローが直前にpushしたコミットを含める
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ビルド
        run: |
          export SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io"
          export BASE_PATH="/${GITHUB_REPOSITORY#*/}"
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
