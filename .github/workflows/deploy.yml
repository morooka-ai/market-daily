name: サイトをビルドしてFirebase Hostingへ公開

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call: # 記事生成ワークフローから呼び出される

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # 生成ワークフローが直前にpushしたコミットを含める
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ビルド
        run: |
          export SITE_URL="https://${{ vars.FIREBASE_PROJECT_ID }}.web.app"
          export BASE_PATH="/"
          npm run build
      - name: Firebase Hostingへデプロイ
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
