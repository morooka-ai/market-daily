name: サイトをビルドしてFirebase Hostingへ公開

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call: # 記事生成ワークフローから呼び出される

# 認証は Workload Identity Federation（鍵レス）。Secretは不要。
# 設定手順は scripts/setup/firebase-deploy-auth.mjs を参照。
permissions:
  contents: read
  id-token: write # Google Cloud への OIDC 認証に必要

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # 生成ワークフローが直前にpushしたコミットを含める
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ビルド
        run: |
          export SITE_URL="https://market-daily-jimulabo.web.app"
          export BASE_PATH="/"
          npm run build
      - name: Google Cloudへ認証（Workload Identity Federation）
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/749554763243/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-action-deploy@market-daily-jimulabo.iam.gserviceaccount.com
      - name: Firebase Hostingへデプロイ
        run: npx firebase-tools deploy --only hosting --project market-daily-jimulabo
