server {
    # Cloud Run のデフォルトポート
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/xml application/xml application/rss+xml;
    gzip_min_length 1024;

    # Astro のハッシュ付きアセットは長期キャッシュ
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML は短めのキャッシュ（記事が朝夕更新されるため）
    location / {
        add_header Cache-Control "public, max-age=300";
        try_files $uri $uri/index.html $uri.html =404;
    }

    error_page 404 /404.html;
}
